[package]
name = "redis-event-stream-module"
version = "0.1.0"
edition = "2021"
description = "Redis module that mirrors keyspace notifications into per-event Redis Streams for durable, replayable event consumption."
repository = "https://github.com/joshrotenberg/redis-event-stream-module"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
# The crates.io release (2.0.8, May 2026) is well behind the repo: tags through
# v2.1.3 are unpublished and master carries newer API. Track git; Cargo.lock
# (committed) pins the exact revision.
redis-module = { git = "https://github.com/RedisLabsModules/redismodule-rs" }
lazy_static = "1"

[profile.release]
lto = true
