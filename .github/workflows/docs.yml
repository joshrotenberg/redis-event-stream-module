name: Docs

# Builds the mdBook site on every relevant PR (validation; needs no Pages
# setup) and deploys it to GitHub Pages on push to main. Enable the site once
# under Settings -> Pages -> Source: GitHub Actions; until then the build job
# still validates and only the deploy job is skipped/needs it.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "SPEC.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "book.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "SPEC.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "book.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - name: Build
        run: mdbook build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
