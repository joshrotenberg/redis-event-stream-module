name: CI

# Docs-only changes (the surface docs.yml owns, plus repo prose) skip this
# workflow entirely; docs.yml still builds the book for them. Nothing in the
# crate reads markdown at build or test time, and main has no required status
# checks, so a skipped run cannot strand a PR on an expected check. A PR
# touching both docs and code still runs: paths-ignore skips only when every
# changed file matches.
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "book.toml"
      - ".github/workflows/docs.yml"
      - "LICENSE*"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "book.toml"
      - ".github/workflows/docs.yml"
      - "LICENSE*"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Unit tests
        run: cargo test --lib
      - name: Build release
        run: cargo build --release

  # MSRV gate: build the resolved graph on the exact floor declared in
  # Cargo.toml (rust-version). --all-targets covers the lib, examples, and the
  # test/dev-dependency graph, so a dependency bump that raises the floor above
  # this pin fails here instead of silently moving the MSRV. Keep this toolchain
  # version and Cargo.toml's rust-version in lockstep; a failure here is
  # resolved by a deliberate rust-version bump commit, not by loosening the leg.
  # No components/build: check only, since fmt and clippy run on stable above.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - name: Check on MSRV
        run: cargo check --all-targets --locked

  # shellcheck is preinstalled on ubuntu runners, so no action dependency.
  # `git ls-files` picks up new scripts automatically; -S style is the
  # strictest severity, held deliberately (see issue #100).
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Shellcheck
        run: git ls-files '*.sh' | xargs shellcheck -S style

  # Lint the contrib/monitoring artifacts (issue #105): the Prometheus rules
  # with promtool, and the Grafana dashboard for JSON validity. jq is
  # preinstalled on ubuntu runners; promtool is downloaded from a pinned
  # Prometheus release (no third-party action, matching the shellcheck job's
  # minimal-dependency posture).
  monitoring:
    runs-on: ubuntu-latest
    env:
      PROM_VERSION: 3.13.1
    steps:
      - uses: actions/checkout@v7
      - name: Install promtool
        run: |
          set -euo pipefail
          url="https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          curl -fsSL "$url" | tar xz --strip-components=1 "prometheus-${PROM_VERSION}.linux-amd64/promtool"
          sudo install -m755 promtool /usr/local/bin/promtool
          promtool --version
      - name: Check Prometheus rules
        run: promtool check rules contrib/monitoring/prometheus/eventstream.rules.yml
      - name: Validate Grafana dashboard JSON
        run: |
          set -euo pipefail
          jq empty contrib/monitoring/grafana/eventstream-dashboard.json
          # Sanity: the dashboard must carry panels and a title.
          test "$(jq '.panels | length' contrib/monitoring/grafana/eventstream-dashboard.json)" -gt 0
          jq -e '.title' contrib/monitoring/grafana/eventstream-dashboard.json >/dev/null

  # Lint the non-Rust consumer examples (issue #110). Compile/vet only — no live
  # server — using the go/node/python toolchains preinstalled on ubuntu runners,
  # matching the shellcheck/monitoring jobs' minimal-dependency posture.
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Python (py_compile)
        run: python3 -m py_compile examples/python/consumer.py
      - name: Node (--check)
        run: node --check examples/node/consumer.js
      - name: Go (vet)
        run: cd examples/go && go vet ./...

  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: redis-7.2
            kind: redis
            version: 7.2.8
          - name: redis-7.4
            kind: redis
            version: 7.4.5
          - name: redis-8
            kind: redis
            version: 8.8.0
          - name: valkey-8
            kind: valkey
            version: 8.1.6
          - name: valkey-9
            kind: valkey
            version: 9.1.0
    name: integration (${{ matrix.name }})
    env:
      SERVER_DIR: ${{ github.workspace }}/.server/${{ matrix.name }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Cache server build
        id: server-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.SERVER_DIR }}
          key: server-${{ matrix.name }}-${{ matrix.version }}-${{ runner.os }}

      - name: Build ${{ matrix.name }} from source
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config
          if [ "${{ matrix.kind }}" = "redis" ]; then
            URL="https://download.redis.io/releases/redis-${{ matrix.version }}.tar.gz"
          else
            # Valkey 9.x's Makefile requires googletest at build time (C++ unit
            # tests, Makefile "googletest not found" hard stop); 8.x does not,
            # but installing it there is harmless.
            sudo apt-get install -y libgtest-dev libgmock-dev
            URL="https://github.com/valkey-io/valkey/archive/refs/tags/${{ matrix.version }}.tar.gz"
          fi
          mkdir -p "$SERVER_DIR"
          curl -fsSL "$URL" | tar xz -C "$SERVER_DIR" --strip-components=1
          make -C "$SERVER_DIR" -j"$(nproc)" BUILD_TLS=no

      - name: Resolve binaries and assert version
        run: |
          set -euo pipefail
          if [ "${{ matrix.kind }}" = "redis" ]; then
            SRV="$SERVER_DIR/src/redis-server"
            CLI="$SERVER_DIR/src/redis-cli"
          else
            SRV="$SERVER_DIR/src/valkey-server"
            CLI="$SERVER_DIR/src/valkey-cli"
          fi
          test -x "$SRV" || { echo "server binary missing: $SRV"; exit 1; }
          test -x "$CLI" || { echo "cli binary missing: $CLI"; exit 1; }
          echo "TEST_REDIS_SERVER_BIN=$SRV" >> "$GITHUB_ENV"
          echo "TEST_REDIS_CLI_BIN=$CLI" >> "$GITHUB_ENV"
          "$SRV" --version
          # Fail loudly if the built binary is not the matrix version, so a
          # stray server on PATH cannot silently test the wrong build.
          "$SRV" --version | grep -q "${{ matrix.version }}" \
            || { echo "version mismatch: expected ${{ matrix.version }}"; exit 1; }

      - name: Build module
        run: cargo build --release

      - name: Integration tests
        run: cargo test --release --tests

      - name: Upload server instance dirs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-instances-${{ matrix.name }}
          path: /tmp/.tmp*/
          if-no-files-found: ignore
          retention-days: 5
