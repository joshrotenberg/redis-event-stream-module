name: Release artifacts

# contents: write         - upload artifacts to the release.
# id-token: write         - OIDC token for keyless Sigstore signing (#104).
# attestations: write     - store the build-provenance attestation (#104).
# packages: write         - push the preloaded image to GHCR (#102).
permissions:
  contents: write
  id-token: write
  attestations: write
  # Required for the docker job to push the preloaded image to GHCR with the
  # workflow's GITHUB_TOKEN (issue #102).
  packages: write

on:
  release:
    types: [published]
  # Called by release.yml after it creates the release from a pushed tag.
  # Releases created by a workflow using GITHUB_TOKEN do not emit a
  # `release: published` event, so the automated path invokes this workflow
  # directly and passes the tag rather than relying on that trigger (#85).
  workflow_call:
    inputs:
      tag:
        description: "Release tag to upload artifacts to."
        required: true
        type: string
  # Self-validation: build (but do not upload to a release or push an image)
  # whenever this workflow, the Dockerfile, or the RAMP manifest changes in a
  # PR, so runner, build, image, and packaging breakage is caught before a
  # release depends on it.
  pull_request:
    paths:
      - ".github/workflows/release-artifacts.yml"
      - "Dockerfile"
      - "ramp.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 rather than -latest: older glibc (2.35) for wider
          # compatibility of the prebuilt .so.
          - name: linux-x86_64
            runner: ubuntu-22.04
            ext: so
          - name: linux-aarch64
            runner: ubuntu-22.04-arm
            ext: so
          - name: macos-aarch64
            runner: macos-14
            ext: dylib
          # No Intel macOS runner exists (macos-13 is retired), so x86_64 macOS
          # is cross-compiled from the arm64 runner (#101). A musl leg for
          # Alpine/musl Redis images is deliberately left to a follow-up: it
          # serves only musl-linked servers, not older-glibc hosts (the
          # ubuntu-22.04 pin already covers those), and its smoke test needs an
          # Alpine container.
          - name: macos-x86_64
            runner: macos-14
            ext: dylib
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release cdylib
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release --target "${{ matrix.target }}"
          else
            cargo build --release
          fi

      - name: Package artifact with checksum
        id: pkg
        run: |
          set -euo pipefail
          VERSION="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(next(p["version"] for p in d["packages"] if p["name"]=="redis-event-stream-module"))')"
          NAME="redis-event-stream-module-${VERSION}-${{ matrix.name }}.${{ matrix.ext }}"
          if [ -n "${{ matrix.target }}" ]; then
            SRC="target/${{ matrix.target }}/release/libredis_event_stream_module.${{ matrix.ext }}"
          else
            SRC="target/release/libredis_event_stream_module.${{ matrix.ext }}"
          fi
          mkdir -p dist
          cp "${SRC}" "dist/${NAME}"
          cd dist
          shasum -a 256 "${NAME}" > "${NAME}.sha256"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          shasum -a 256 -c "${NAME}.sha256"

      # The consumer client binary (issue #82), so operators get the
      # discovery/merge/verification tooling without a Rust toolchain. Built by
      # the same `cargo build --release[ --target]` above (it is a workspace
      # member); this step just packages it with a checksum. No extension:
      # eventstream-client is a native executable on both Linux and macOS.
      - name: Package the consumer client binary with checksum
        id: client
        run: |
          set -euo pipefail
          VERSION="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(next(p["version"] for p in d["packages"] if p["name"]=="eventstream-client"))')"
          NAME="eventstream-client-${VERSION}-${{ matrix.name }}"
          if [ -n "${{ matrix.target }}" ]; then
            SRC="target/${{ matrix.target }}/release/eventstream-client"
          else
            SRC="target/release/eventstream-client"
          fi
          mkdir -p dist
          cp "${SRC}" "dist/${NAME}"
          cd dist
          shasum -a 256 "${NAME}" > "${NAME}.sha256"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          shasum -a 256 -c "${NAME}.sha256"

      # Attest each uploaded artifact so consumers can trace the .so/.dylib and
      # the client binary back to this repo, commit, and workflow run (#104).
      # Skipped on the PR self-validation path, which builds but never uploads:
      # attesting a throwaway artifact is noise and the OIDC claims would name
      # the PR ref.
      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/${{ steps.pkg.outputs.name }}
            dist/${{ steps.client.outputs.name }}

      - name: Smoke test the artifact loads
        # Cross-compiled legs (matrix.target set) cannot run natively here, and
        # Rosetta only helps with an x86_64 redis-server; skip the load smoke,
        # mirroring the too-old-distro skip below.
        if: matrix.target == ''
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y redis-server redis-tools || true
          else
            brew install redis
          fi
          # Distro Redis can predate 7.2; only smoke-test where it is new enough.
          MAJOR="$(redis-server --version | sed -E 's/.*v=([0-9]+)\..*/\1/')"
          MINOR="$(redis-server --version | sed -E 's/.*v=[0-9]+\.([0-9]+).*/\1/')"
          if [ "$MAJOR" -lt 7 ] || { [ "$MAJOR" -eq 7 ] && [ "$MINOR" -lt 2 ]; }; then
            echo "redis-server ${MAJOR}.${MINOR} < 7.2; skipping load smoke (CI matrix covers it)"
            exit 0
          fi
          DIR="$(mktemp -d)"
          redis-server --port 6397 --dir "$DIR" --daemonize yes --logfile "$DIR/l.log" \
            --loadmodule "$PWD/dist/${{ steps.pkg.outputs.name }}"
          sleep 1
          redis-cli -p 6397 MODULE LIST | grep -q eventstream
          redis-cli -p 6397 SHUTDOWN NOSAVE || true
          echo "artifact loads cleanly"

      - name: Upload to the release
        # release: published (manual/UI release) or workflow_call from
        # release.yml (github.event_name is the caller's `push`); the only
        # non-uploading path is the PR self-validation build.
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" \
            "dist/${{ steps.pkg.outputs.name }}" \
            "dist/${{ steps.pkg.outputs.name }}.sha256" \
            "dist/${{ steps.client.outputs.name }}" \
            "dist/${{ steps.client.outputs.name }}.sha256" \
            --clobber

      - name: Upload as workflow artifact (PR validation runs)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: dist/
          retention-days: 5

  # Preloaded container image (issue #102). Multi-arch (amd64+arm64) to match
  # the linux-x86_64/linux-aarch64 binary matrix; the macOS .dylib is out of
  # scope for images. On release: build and push to GHCR. On PR: build a single
  # native-arch image, load it, and run the load smoke test without pushing.
  docker:
    name: docker image (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Server versions pinned to the CI integration matrix (SPEC.md
          # section 14), built from source in the image (see Dockerfile).
          - name: redis
            server_kind: redis
            server_version: "8.8.0"
            suffix: ""
          - name: valkey8
            server_kind: valkey
            server_version: "8.1.6"
            suffix: "-valkey8"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3

      - name: Derive image tags
        id: meta
        run: |
          set -euo pipefail
          VERSION="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(next(p["version"] for p in d["packages"] if p["name"]=="redis-event-stream-module"))')"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          SUFFIX="${{ matrix.suffix }}"
          TAGS="${IMAGE}:${VERSION}${SUFFIX}"
          # `latest` (and the bare `-valkey8` moving tag) on any publishing
          # run: a UI `release: published` event or the automated tag-push
          # path (release.yml calls this via workflow_call, where
          # github.event_name is the caller's `push`; a GITHUB_TOKEN-created
          # release emits no `release: published`, see #85). Never on the PR
          # self-validation build.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            if [ -n "$SUFFIX" ]; then
              TAGS="${TAGS},${IMAGE}:latest${SUFFIX}"
            else
              TAGS="${TAGS},${IMAGE}:latest"
            fi
          fi
          {
            echo "image=${IMAGE}"
            echo "version=${VERSION}"
            echo "tags=${TAGS}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        # Any non-PR run publishes: the UI `release: published` event or the
        # automated path (release.yml -> workflow_call, where
        # github.event_name is the caller's `push` and a GITHUB_TOKEN-created
        # release emits no `release: published`, see #85). PR self-validation
        # never logs in or pushes.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # PR validation: single-arch build loaded into the local daemon so the
      # smoke test can run it. buildx --load supports one platform only.
      - name: Build image (PR validation, load locally)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          build-args: |
            SERVER_KIND=${{ matrix.server_kind }}
            SERVER_VERSION=${{ matrix.server_version }}
          tags: eventstream-ci:${{ matrix.name }}

      - name: Smoke test the image loads the module
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # On any failure below, dump the server's own output before the
          # container is reaped: a fatal loadmodule error (ABI/glibc mismatch,
          # bad path) exits redis-server immediately, and its stderr is the
          # only place that says why.
          trap 'echo "=== es-smoke logs ==="; docker logs es-smoke 2>&1 || true' EXIT
          docker run -d --name es-smoke -p 6399:6379 "eventstream-ci:${{ matrix.name }}"
          for i in $(seq 1 20); do
            if docker exec es-smoke redis-cli PING 2>/dev/null | grep -q PONG; then
              break
            fi
            sleep 0.5
          done
          docker exec es-smoke redis-cli MODULE LIST | grep -q eventstream
          echo "image loads the module cleanly"

      # Release: multi-arch manifest pushed to GHCR on any non-PR run (see the
      # login step above for why this is `!= 'pull_request'` and not
      # `== 'release'`: the automated tag-push path never has event `release`).
      - name: Build and push image (release)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SERVER_KIND=${{ matrix.server_kind }}
            SERVER_VERSION=${{ matrix.server_version }}
          tags: ${{ steps.meta.outputs.tags }}

  # Redis Enterprise RAMP bundle (issue #103). Enterprise is linux-only and
  # does not load a bare .so; `ramp pack` wraps it with a generated module.json
  # into the zip that `POST /v1/modules` accepts. ramp-packer loads the module
  # into a throwaway redis-server to enumerate commands, so a redis-server 7.2+
  # must be on PATH (distro redis on ubuntu predates 7.2 and would abort the
  # load per SPEC.md section 14, so redis is installed from packages.redis.io).
  # The bundle still requires validation against a real Enterprise database
  # before the first release that ships it (issue #103, step 3).
  ramp:
    name: ramp package (linux-x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ramp-packer and a modern redis-server
        run: |
          set -euo pipefail
          pip install ramp-packer
          sudo apt-get update
          sudo apt-get install -y lsb-release curl gpg
          curl -fsSL https://packages.redis.io/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/redis-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/redis-archive-keyring.gpg] https://packages.redis.io/deb $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/redis.list
          sudo apt-get update
          sudo apt-get install -y redis
          redis-server --version

      - name: Build release cdylib
        # -p scopes the build to the module package: the RAMP bundle wraps only
        # the module .so, so the consumer client crate (issue #82) need not be
        # compiled here.
        run: cargo build --release --lib -p redis-event-stream-module

      - name: Pack the RAMP bundle with checksum
        id: pkg
        run: |
          set -euo pipefail
          VERSION="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); print(next(p["version"] for p in d["packages"] if p["name"]=="redis-event-stream-module"))')"
          SO="redis-event-stream-module-${VERSION}-linux-x86_64.so"
          ZIP="redis-event-stream-module-${VERSION}-linux-x86_64.zip"
          mkdir -p dist
          cp target/release/libredis_event_stream_module.so "dist/${SO}"
          # ramp pack loads the module to extract commands/version; manifest
          # drift (e.g. a new command) surfaces here, on PR, not at release.
          ramp pack "dist/${SO}" -m ramp.yml -o "dist/${ZIP}"
          cd dist
          shasum -a 256 "${ZIP}" > "${ZIP}.sha256"
          shasum -a 256 -c "${ZIP}.sha256"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"

      - name: Upload to the release
        # Mirror the .so upload: fire on any non-PR run and take the tag from
        # inputs.tag (workflow_call / automated path) or the release event, so
        # the automated tag-push path uploads too -- github.event.release is
        # empty there (see #85).
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" \
            "dist/${{ steps.pkg.outputs.zip }}" \
            "dist/${{ steps.pkg.outputs.zip }}.sha256" \
            --clobber

      - name: Upload as workflow artifact (PR validation runs)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.pkg.outputs.zip }}
          path: dist/
          retention-days: 5
