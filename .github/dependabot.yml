version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["area:ci"]
    commit-message:
      prefix: "chore"
    groups:
      github-actions:
        update-types: ["minor", "patch"]
    ignore:
      # dtolnay/rust-toolchain is referenced as @stable and @nightly
      # (intentionally unpinned) and, in the msrv job, as @1.88 — the
      # crate's declared MSRV (rust-version in Cargo.toml), pinned on
      # purpose to fail CI if the code stops compiling on the floor.
      # Dependabot reads that ref as a version to bump; it must not.
      - dependency-name: "dtolnay/rust-toolchain"

  # Does not cover the redis-module / redis-module-macros git-tag pin
  # (Cargo.toml); dependabot cannot bump git-tag dependencies, so that
  # pin is updated by hand when redismodule-rs tags a new release.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["area:ci"]
    commit-message:
      prefix: "chore"
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]
