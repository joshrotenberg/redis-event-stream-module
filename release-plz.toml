# Release automation (issue #27). release-plz opens a release PR on each push
# to main (version bump + changelog from conventional commits); merging that PR
# tags the release and creates the GitHub release. The release-artifacts
# workflow then attaches prebuilt module binaries to it.
#
# This crate is a cdylib Redis module: consumers load a compiled artifact, not
# a Rust dependency, so crates.io publishing adds nothing and is disabled here
# (and via publish = false in Cargo.toml). Versions, tags, changelog, and
# GitHub releases still flow through release-plz.

[workspace]
publish = false
git_tag_enable = true
git_release_enable = true
changelog_update = true
git_release_body = """
{{ changelog }}

## Install

Download the module for your platform below, verify the checksum, and load it:

```
shasum -a 256 -c redis-event-stream-module-<version>-<target>.<ext>.sha256
redis-server --loadmodule ./redis-event-stream-module-<version>-<target>.<ext>
```

Requires Redis 7.2+ or Valkey 8.x. Artifacts are attached by CI within a few
minutes of the release being published.
"""
