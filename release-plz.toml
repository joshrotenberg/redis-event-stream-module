# Release automation (issue #27). Releases are hand-prepped: bump the version in
# Cargo.toml and add a CHANGELOG entry in a "chore: release prep for vX.Y.Z" PR
# (v0.1.0 in #40, v0.2.0 in #53). Merging it to main triggers this workflow's
# `release-plz release` step, which tags the version and creates the GitHub
# release; the release-artifacts workflow then attaches the prebuilt binaries.
#
# release-plz's automatic version-bump PR does NOT run here, by design. It needs
# either a crates.io baseline (this crate is publish = false, never published)
# or `git_only = true`, and git_only mode runs `cargo package`, which fails
# because the redis-module dependencies are git-pinned with no crates.io version
# (redis-module-macros resolves to a 99.99.99 placeholder). So the bump is
# manual and only `release-plz release` (tag + GitHub release) is used.
#
# This crate is a cdylib Redis module: consumers load a compiled artifact, not a
# Rust dependency, so crates.io publishing adds nothing and is disabled here (and
# via publish = false in Cargo.toml).

[workspace]
publish = false
git_tag_enable = true
git_release_enable = true
changelog_update = true
git_release_body = """
{{ changelog }}

## Install

Download the module for your platform below, verify the checksum, and load it:

```
shasum -a 256 -c redis-event-stream-module-<version>-<target>.<ext>.sha256
redis-server --loadmodule ./redis-event-stream-module-<version>-<target>.<ext>
```

Requires Redis 7.2+ or Valkey 8.x. Artifacts are attached by CI within a few
minutes of the release being published.
"""
