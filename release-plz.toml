# Release process (issue #27). Fully manual, in three steps:
#   1. Bump the version in Cargo.toml and add a CHANGELOG entry in a
#      "chore: release prep for vX.Y.Z" PR (v0.1.0 in #40, v0.2.0 in #53).
#   2. Merge it to main.
#   3. Create the GitHub release from the tag by hand, e.g.
#        awk '/^## \[X.Y.Z\]/{f=1} /^## \[/{if(f && !/X.Y.Z/)f=0} f' CHANGELOG.md > notes.md
#        gh release create vX.Y.Z --target main --title vX.Y.Z --notes-file notes.md
#      Publishing the release triggers release-artifacts.yml (on
#      `release: published`), which builds and attaches the prebuilt binaries.
#
# release-plz does NOT tag or release this crate, despite this config. Its
# `release` step reports "nothing to release": the crate is publish = false, so
# there is no crates.io baseline to diff against, and switching to
# `git_only = true` fails because git_only mode runs `cargo package`, which
# rejects the git-pinned redis-module dependencies (no crates.io version;
# redis-module-macros is a 99.99.99 placeholder). Its automatic version-bump PR
# does not open for the same reason. The workflow is kept only for the git
# config it sets and in case a future release-plz handles this dependency shape;
# enabling "Actions may create PRs" in repo settings does not change this,
# because release-plz never gets as far as trying to open a PR.
#
# This crate is a cdylib Redis module: consumers load a compiled artifact, not a
# Rust dependency, so crates.io publishing adds nothing and is disabled here (and
# via publish = false in Cargo.toml).

[workspace]
publish = false
git_tag_enable = true
git_release_enable = true
changelog_update = true
git_release_body = """
{{ changelog }}

## Install

Download the module for your platform below, verify the checksum, and load it:

```
shasum -a 256 -c redis-event-stream-module-<version>-<target>.<ext>.sha256
redis-server --loadmodule ./redis-event-stream-module-<version>-<target>.<ext>
```

Requires Redis 7.2+ or Valkey 8.x. Artifacts are attached by CI within a few
minutes of the release being published.
"""
