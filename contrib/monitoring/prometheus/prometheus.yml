# Prometheus config for the local monitoring stack (docker-compose.yml).
#
# Two scrape jobs observe the same Redis instance and both carry a shared
# `redis_instance` label so the EventstreamFilterMisconfigured rule can join a
# sidecar metric (eventstream_forwarded) with a redis_exporter metric
# (redis_expired_keys_total) via `on(redis_instance)`. Keep the label identical
# across both jobs when you adapt this to a real deployment.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/eventstream.rules.yml

scrape_configs:
  # Standard redis_exporter: redis_* metrics (incl. redis_expired_keys_total),
  # module_info, and — via --check-streams=events:* — redis_stream_length and
  # redis_stream_group_lag for the events:* destination streams. It does NOT
  # export the eventstream_* counters (see README.md).
  - job_name: redis_exporter
    static_configs:
      - targets: ["redis_exporter:9121"]
        labels:
          redis_instance: "redis:6379"

  # node_exporter, exposing the eventstream_* counters written by the sidecar
  # collector into its textfile-collector directory.
  - job_name: eventstream
    static_configs:
      - targets: ["node_exporter:9100"]
        labels:
          redis_instance: "redis:6379"

  # Prometheus scraping itself, for stack health.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
